<style>
/* ===== CSS RESET & BASE ===== */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
  font-size: 16px;
}
body {
  font-family: 'Courier New', 'Courier', 'Impact', 'Arial Black', 'Franklin Gothic Bold', sans-serif;
  font-weight: 800;
  background-color: #111111;
  color: #ffff00;
  line-height: 1.2;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ===== VARIABLES ===== */
:root {
  --primary: #111111;
  --secondary: #ffff00;
  --accent: #00ff41;
  --border: 4px;
  --gap: 16px;
  --pad: 24px;
  --sec-gap: 40px;
  --font-mono: 'Courier New', 'Courier', monospace;
  --font-impact: Impact, 'Arial Black', 'Franklin Gothic Bold', sans-serif;
  --text-shadow: 3px 3px 0 #00ff41, -2px -2px 0 #ff0055;
}

/* ===== TYPOGRAPHY ===== */
h1, h2, h3, h4 {
  font-family: var(--font-impact);
  font-weight: 900;
  text-transform: uppercase;
  line-height: 0.95;
  letter-spacing: -0.04em;
}
h1 {
  font-size: clamp(3rem, 15vw, 7rem);
  color: var(--secondary);
  text-shadow: var(--text-shadow);
  margin-bottom: 0.2em;
  transform: rotate(-2deg) skewX(-5deg);
}
h2 {
  font-size: clamp(2rem, 8vw, 4rem);
  color: var(--secondary);
  border-left: var(--border) solid var(--accent);
  padding-left: 12px;
  margin-bottom: var(--gap);
  transform: skewX(-3deg);
}
h3 {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  color: var(--secondary);
}
p, li, blockquote {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1.1rem;
  line-height: 1.4;
  color: #dddddd;
}
a {
  color: var(--secondary);
  text-decoration: none;
  border-bottom: 3px solid var(--accent);
  transition: all 0.1s ease;
}
a:hover {
  color: var(--primary);
  background: var(--secondary);
  border-bottom-color: var(--secondary);
}
strong, b {
  color: var(--accent);
  font-weight: 900;
}

/* ===== LAYOUT ===== */
body {
  padding: 0 var(--pad);
  max-width: 100vw;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header, nav, main, section, footer {
  width: 100%;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--pad) 0;
  border-bottom: var(--border) solid var(--secondary);
  margin-bottom: var(--sec-gap);
  position: relative;
}
.logo {
  font-family: var(--font-impact);
  font-size: 2.2rem;
  font-weight: 900;
  color: var(--secondary);
  text-shadow: 2px 2px 0 var(--accent);
  transform: skewX(-8deg) rotate(1deg);
  line-height: 1;
  border: none !important;
}
.logo span {
  color: var(--accent);
  font-size: 1.8rem;
}
/* desktop nav */
nav.desktop-nav ul {
  display: flex;
  list-style: none;
  gap: var(--gap);
}
nav.desktop-nav a {
  font-family: var(--font-impact);
  font-size: 1.2rem;
  color: var(--secondary);
  padding: 8px 16px;
  border: var(--border) solid var(--secondary);
  background: var(--primary);
  text-decoration: none;
  transform: skewX(4deg);
  transition: 0.1s;
}
nav.desktop-nav a:hover {
  background: var(--secondary);
  color: var(--primary);
  transform: skewX(-4deg) scale(1.02);
}

/* ===== MOBILE HAMBURGER ===== */
.menu-toggle {
  display: none;
  background: none;
  border: var(--border) solid var(--secondary);
  color: var(--secondary);
  font-size: 2rem;
  padding: 4px 12px;
  cursor: pointer;
  z-index: 100;
}
.menu-toggle:focus {
  outline: 3px solid var(--accent);
}
.mobile-nav {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: var(--primary);
  z-index: 99;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: var(--pad);
  border: var(--border) solid var(--secondary);
}
.mobile-nav.open {
  display: flex;
}
.mobile-nav a {
  font-family: var(--font-impact);
  font-size: 2.5rem;
  color: var(--secondary);
  padding: 12px 24px;
  border: var(--border) solid var(--accent);
  background: transparent;
  text-decoration: none;
  transform: rotate(2deg);
}
.mobile-nav a:hover {
  background: var(--secondary);
  color: var(--primary);
}
.mobile-nav .close-btn {
  position: absolute;
  top: 20px;
  right: 24px;
  font-size: 3rem;
  color: var(--accent);
  background: none;
  border: var(--border) solid var(--secondary);
  padding: 4px 16px;
  cursor: pointer;
}

@media (max-width: 768px) {
  nav.desktop-nav {
    display: none;
  }
  .menu-toggle {
    display: block;
  }
  header {
    flex-wrap: wrap;
  }
  .logo {
    font-size: 1.8rem;
  }
}

/* ===== HERO ===== */
.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--gap);
  padding: var(--pad) 0;
  margin-bottom: var(--sec-gap);
  border: var(--border) solid var(--accent);
  background: repeating-linear-gradient(
    45deg,
    #111111 0px, #111111 10px,
    #1a1a1a 10px, #1a1a1a 20px
  );
  position: relative;
  transform: skewY(1deg);
  padding: 32px 24px;
}
.hero::before {
  content: '';
  position: absolute;
  top: -8px; left: -8px;
  width: 40px; height: 40px;
  background: var(--accent);
  z-index: -1;
}
.hero-left {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.hero-left h1 {
  font-size: clamp(3rem, 12vw, 6rem);
  transform: rotate(-3deg) skewX(-7deg);
  color: var(--secondary);
  text-shadow: 4px 4px 0 var(--accent), -3px -3px 0 #ff0055;
  line-height: 0.9;
  margin-bottom: 8px;
}
.hero-left .tagline {
  font-family: var(--font-impact);
  font-size: 1.8rem;
  color: var(--accent);
  border: 3px solid var(--secondary);
  padding: 8px 16px;
  display: inline-block;
  transform: skewX(8deg);
  margin-top: 8px;
}
.hero-right {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-end;
  gap: var(--gap);
}
.cta-phone {
  font-family: var(--font-impact);
  font-size: 2.2rem;
  color: var(--primary);
  background: var(--secondary);
  padding: 16px 32px;
  border: var(--border) solid var(--accent);
  text-decoration: none;
  transform: rotate(2deg) skewX(-5deg);
  display: inline-block;
  text-align: center;
  box-shadow: 6px 6px 0 var(--accent);
  transition: 0.1s;
}
.cta-phone:hover {
  background: var(--accent);
  color: var(--primary);
  transform: rotate(-2deg) skewX(5deg);
  box-shadow: -6px -6px 0 var(--secondary);
}
.hero-discount {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  background: var(--primary);
  color: var(--secondary);
  border: 3px dashed var(--accent);
  padding: 12px 20px;
  transform: skewX(-4deg);
  text-align: center;
}

@media (max-width: 768px) {
  .hero {
    grid-template-columns: 1fr;
    text-align: center;
  }
  .hero-right {
    align-items: center;
  }
  .cta-phone {
    font-size: 1.8rem;
    padding: 12px 24px;
  }
}

/* ===== SECTIONS ===== */
section {
  padding: var(--pad) 0;
  margin-bottom: var(--sec-gap);
  border-top: var(--border) solid var(--secondary);
  border-bottom: var(--border) solid var(--secondary);
  position: relative;
}
section::after {
  content: '■';
  position: absolute;
  bottom: -14px; right: -4px;
  font-size: 1.5rem;
  color: var(--accent);
  background: var(--primary);
  padding: 0 4px;
}
.section-title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  color: var(--secondary);
  margin-bottom: var(--gap);
  border-left: 6px solid var(--accent);
  padding-left: 16px;
  transform: skewX(-6deg);
}

/* ===== DISCOUNT GRID ===== */
.discount-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: var(--gap);
  margin-top: var(--gap);
}
.discount-card {
  border: var(--border) solid var(--secondary);
  padding: var(--pad);
  background: #1a1a1a;
  transform: rotate(1deg);
  transition: 0.1s;
}
.discount-card:nth-child(2n) {
  transform: rotate(-2deg) translateY(8px);
}
.discount-card:hover {
  transform: rotate(0deg) scale(1.02);
  border-color: var(--accent);
  background: #222222;
}
.discount-card h3 {
  font-size: 1.8rem;
  color: var(--accent);
  margin-bottom: 8px;
}
.discount-card .price {
  font-family: var(--font-impact);
  font-size: 2.2rem;
  color: var(--secondary);
  text-shadow: 2px 2px 0 var(--accent);
}

/* ===== UGC REVIEWS ===== */
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: var(--gap);
  margin-top: var(--gap);
}
.review-card {
  border: 4px solid var(--secondary);
  padding: var(--pad);
  background: var(--primary);
  position: relative;
  transform: skewY(1deg);
}
.review-card:nth-child(odd) {
  transform: skewY(-1deg) translateX(4px);
}
.review-card::before {
  content: '💬';
  position: absolute;
  top: -20px; left: -10px;
  font-size: 2.5rem;
  transform: rotate(-15deg);
}
.review-card .review-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--accent);
  border-bottom: 2px dashed var(--secondary);
  padding-bottom: 8px;
}
.review-card .review-text {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: #cccccc;
  text-transform: none;
  letter-spacing: 0;
  line-height: 1.5;
}
.review-card .stars {
  font-size: 1.4rem;
  color: var(--secondary);
  letter-spacing: 2px;
}

/* ===== INFO ===== */
.info-block {
  display: flex;
  flex-wrap: wrap;
  gap: var(--gap);
  margin-top: var(--gap);
}
.info-block > div {
  flex: 1 1 200px;
  border: 3px solid var(--accent);
  padding: var(--pad);
  background: #1a1a1a;
  transform: rotate(-0.5deg);
}
.info-block > div:nth-child(2) {
  transform: rotate(1.5deg) translateY(-6px);
}
.info-block h3 {
  font-size: 1.6rem;
  color: var(--secondary);
  margin-bottom: 8px;
}
.info-block p {
  font-size: 1rem;
  color: #bbbbbb;
  text-transform: none;
}

/* ===== FOOTER ===== */
footer {
  border-top: var(--border) solid var(--secondary);
  padding: var(--pad) 0;
  margin-top: var(--sec-gap);
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: var(--gap);
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: #888;
}
footer a {
  color: var(--accent);
  border-bottom: 2px solid var(--secondary);
}
footer a:hover {
  background: var(--secondary);
  color: var(--primary);
}
.footer-legal {
  text-transform: none;
  letter-spacing: 0;
}

/* ===== RESPONSIVE TWEAKS ===== */
@media (max-width: 768px) {
  h1 { font-size: 2.5rem; }
  h2 { font-size: 2rem; }
  .hero-left h1 { font-size: 2.8rem; }
  .hero-left .tagline { font-size: 1.2rem; }
  .cta-phone { font-size: 1.5rem; padding: 12px 20px; }
  .discount-grid { grid-template-columns: 1fr; }
  .reviews-grid { grid-template-columns: 1fr; }
  .info-block { flex-direction: column; }
  footer { flex-direction: column; text-align: center; }
}

/* ===== UTILITY ===== */
.text-accent { color: var(--accent); }
.text-secondary { color: var(--secondary); }
.border-accent { border-color: var(--accent) !important; }
.bg-primary { background: var(--primary); }
.skew-left { transform: skewX(-5deg); }
.skew-right { transform: skewX(5deg); }
.rotate-1 { transform: rotate(1deg); }
.rotate-neg1 { transform: rotate(-1deg); }
.no-transform { transform: none !important; }

</body>
